openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sentinel API - adaptive path intelligence system
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: User input sessions
  - name: signals
    description: Input signals within sessions
  - name: paths
    description: Adaptive decision paths
  - name: dashboard
    description: Dashboard and analytics
  - name: ai
    description: AI inference engine with scoring and memory
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Session deleted
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List signals for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"
    post:
      operationId: createSignal
      tags: [signals]
      summary: Submit a new signal to a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSignalBody"
      responses:
        "201":
          description: Signal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  /sessions/{id}/paths:
    get:
      operationId: listPaths
      tags: [paths]
      summary: List adaptive paths for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdaptivePath"

  /sessions/{id}/paths/{pathId}/feedback:
    post:
      operationId: submitPathFeedback
      tags: [paths]
      summary: Submit feedback for a path
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pathId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathFeedbackBody"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdaptivePath"

  /sessions/{id}/memory:
    get:
      operationId: getSessionMemory
      tags: [ai]
      summary: Get AI memory snapshot for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySnapshot"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: resetSessionMemory
      tags: [ai]
      summary: Reset AI memory for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySnapshot"

  /infer:
    post:
      operationId: runInference
      tags: [ai]
      summary: Submit input to AI engine for real-time scoring (SSE stream)
      description: |
        Accepts a text input and optional sessionId. The AI engine scores the input
        semantically, assigns weight/category/confidence from memory context, and
        streams the scored result back in real time. Consume with fetch + ReadableStream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferBody"
      responses:
        "200":
          description: SSE stream of inference events
          content:
            text/event-stream: {}

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall system summary and stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent signal activity across all sessions
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/signal-weights:
    get:
      operationId: getSignalWeights
      tags: [dashboard]
      summary: Get aggregate semantic weight distribution across all signals
      responses:
        "200":
          description: Signal weight distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalWeightStat"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Session:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, completed]
        signalCount:
          type: integer
        pathCount:
          type: integer
        adaptationScore:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - status
        - signalCount
        - pathCount
        - adaptationScore
        - createdAt
        - updatedAt

    CreateSessionBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required:
        - name

    UpdateSessionBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, completed]

    Signal:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        input:
          type: string
        category:
          type: string
          enum: [behavioral, semantic, temporal, contextual]
        weight:
          type: number
        confidence:
          type: number
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - input
        - category
        - weight
        - confidence
        - tags
        - createdAt

    CreateSignalBody:
      type: object
      properties:
        input:
          type: string
        category:
          type: string
          enum: [behavioral, semantic, temporal, contextual]
        weight:
          type: number
        tags:
          type: array
          items:
            type: string
      required:
        - input
        - category

    AdaptivePath:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        label:
          type: string
        description:
          type: string
        confidence:
          type: number
        feedbackScore:
          type: number
        nodes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, reinforced, deprecated]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - label
        - description
        - confidence
        - feedbackScore
        - nodes
        - status
        - createdAt

    PathFeedbackBody:
      type: object
      properties:
        score:
          type: number
        note:
          type: ["string", "null"]
      required:
        - score

    DashboardSummary:
      type: object
      properties:
        totalSessions:
          type: integer
        activeSessions:
          type: integer
        totalSignals:
          type: integer
        totalPaths:
          type: integer
        avgAdaptationScore:
          type: number
        topCategory:
          type: string
      required:
        - totalSessions
        - activeSessions
        - totalSignals
        - totalPaths
        - avgAdaptationScore
        - topCategory

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [signal, path, feedback, session]
        sessionId:
          type: integer
        sessionName:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - sessionId
        - sessionName
        - description
        - createdAt

    SignalWeightStat:
      type: object
      properties:
        category:
          type: string
        avgWeight:
          type: number
        count:
          type: integer
        percentage:
          type: number
      required:
        - category
        - avgWeight
        - count
        - percentage

    InferBody:
      type: object
      properties:
        input:
          type: string
          description: Raw text input to score through the AI engine
        sessionId:
          type: ["integer", "null"]
          description: Optional session ID to use for memory context
      required:
        - input

    MemorySnapshot:
      type: object
      properties:
        sessionId:
          type: integer
        signalCount:
          type: integer
        dominantCategory:
          type: string
        avgWeight:
          type: number
        avgConfidence:
          type: number
        patterns:
          type: array
          items:
            type: string
        learnedTags:
          type: array
          items:
            type: string
        adaptationScore:
          type: number
      required:
        - sessionId
        - signalCount
        - dominantCategory
        - avgWeight
        - avgConfidence
        - patterns
        - learnedTags
        - adaptationScore

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
