kind = "mobile"
previewPath = "/sentinel-mobile/"
title = "Sentinel Mobile"
version = "1.0.0"
id = "artifacts/sentinel-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/sentinel-mobile/" ]
localPort = 20389

[services.development]
run = "pnpm --filter @workspace/sentinel-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sentinel-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sentinel-mobile", "run", "serve" ]

[services.env]
PORT = "20389"
BASE_PATH = "/sentinel-mobile/"
